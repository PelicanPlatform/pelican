      description: Generates a federation token for a given host and server type.
      parameters:
        - name: host
          in: query
          required: true
          schema:
            type: string
          description: The hostname of the server.
        - name: sType
          in: query
          required: true
          schema:
            type: string
            enum: [Cache, Origin]
          description: The server type (Cache or Origin).
        - name: authz
          in: query
          required: true
          schema:
            type: string
          description: The authorization token, may also be passed via "Authorization" header.
      responses:
