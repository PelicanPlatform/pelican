  /downtime:
    post:
      tags:
        - common
      summary: Create a new downtime entry for this server or given server
      description: >-
        - On Origin or Cache servers, this creates downtimes on current server itself.
        - On the Registry, this can create downtimes for any server managed by the federation.

        `Authentication Required` `Admin Privilege Required`
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: downtime
          description: The downtime event to create
          required: true
          schema:
            type: object
            properties:
              class:
                type: string
                description: Class of downtime (SCHEDULED or UNSCHEDULED)
                enum:
                  - SCHEDULED
                  - UNSCHEDULED
                required: true
              description:
                type: string
                description: Description of the downtime event
              severity:
                type: string
                description: Severity of the downtime event
                enum:
                  - Outage (completely inaccessible)
                  - Severe (most services down)
                  - Intermittent Outage (may be up for some of the time)
                  - No Significant Outage Expected (you shouldn't notice)
                required: true
              startTime:
                type: integer
                format: int64
                description: Start time of the downtime in milliseconds since epoch (UTC)
                required: true
              endTime:
                type: integer
                format: int64
                description: End time of the downtime in milliseconds since epoch (UTC). -1 indicates the downtime is ongoing indefinitely.
                required: true
      responses:
        "200":
          description: Downtime created successfully
          schema:
            $ref: "#/definitions/Downtime"
        "400":
          description: Invalid request data
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Authentication required
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Permission denied. Admin privilege required.
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorModelV2"
    get:
      tags:
        - common
      summary: Retrieve active and upcoming downtime entries for this server or registry-managed entries
      description: >-
        Returns the list of downtime entries:
        - On Origin or Cache servers, this includes downtimes set by the server itself.
        - On the Registry, this includes downtimes set by federation administrators.
      produces:
        - application/json
      parameters:
      - in: query
        name: status
        type: string
        description: Filter downtime entries by status. "incomplete" includes active and future downtimes
        enum:
          - incomplete
          - all
      - in: query
        name: source
        type: string
        description: >-
          Filter downtime entries by their source (set by which Pelican service).

          Possible values:

          - `registry`: downtimes set by federation administrators.

          - `origin`: downtimes set by origin server admin.

          - `cache`: downtimes set by cache server admin.

        enum:
          - registry
          - origin
          - cache
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              $ref: "#/definitions/Downtime"
        "401":
          description: Authentication required
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Permission denied. Admin privilege required.
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorModelV2"
