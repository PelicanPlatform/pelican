swagger: "2.0"
info:
  title: Pelican Server APIs
  description:
    "[Pelican](https://pelicanplatform.org/) provides an open-source software platform for federating
    dataset repositories together and delivering the objects to computing capacity such as the [OSPool](https://osg-htc.org/services/open_science_pool.html)


    This is the API documentation for various APIs in Pelican servers (director, registry, origin, etc)
    to communicate with each other and in-between users accessing the servers.


    Note that we use cookie authentication and authorization. We check a cookie named `login` with value being a JWT.
    The cookie is issued after a successful call to `/api/v1.0/auth/login`. However, OpenAPI 2.0 does not support specifying cookie-based security check.
    Therefore, as an alternative, we will add `Authentication Required` to the API description where needed.

    For endpoint that is only accessible by users with admin privilege, we mark the endpoint as `Admin privilege Required`.


    For how to set up Pelican servers, please refer to the documentation at [docs.pelicanplatform.org](https://docs.pelicanplatform.org/)"
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: API Support via Pelican GitHub Issue
    url: https://github.com/PelicanPlatform/pelican/issues
  version: "1.0"
basePath: /api/v1.0/
consumes:
  - application/json
produces:
  - application/json
schemes:
  - https
securityDefinitions:
  # This is a hacky way to specify Bearer token auth here because it's not actually an "apikey"
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: >-
      Enter the JWT with the `Bearer` prefix, e.g. "Bearer abcde12345".
definitions:
  HealthStatus:
    type: object
    description: The health status of a server component
    properties:
      status:
        type: string
        description: The status of the component, can be one of "unknown", "warning", "ok", and "critical"
        example: warning
      message:
        type: string
        description: Optional message to describe the status
        example: ""
      last_update:
        type: integer
        description: Int64 unix time of the last status update
        example: 1700594867
    readOnly: true
  WhoAmI:
    type: object
    description: The return data of /auth/whoami endpoint
    properties:
      authenticated:
        type: boolean
        description: If the current user is authenticated
        example: true
        default: false
      role:
        type: string
        description: The user role. Will be either "admin" or "user"
        example: "user"
        default: ""
      user:
        type: string
        description: The user identifier. For root user, it will be "admin".
          For regular user from CILogon login, it will be the "sub" claim of their CILogon access token
        example: "http://cilogon.org/serverA/users/12345"
        default: ""
  ErrorModel:
    type: object
    description: The error response of a request
    properties:
      error:
        type: string
        description: The detail error message
        example: Bad request
  ErrorModelV2:
    type: object
    description: The error response of a request
    properties:
      status:
        type: string
        default: "error"
        description: The response status
      msg:
        type: string
        default: ""
        description: The response message
  SimpleApiResp:
    type: object
    description: >-
      Generic response envelope used by many endpoints that don't have a
      richer payload — mirrors the Go `server_structs.SimpleApiResp`
      type. `status` is "success" or "error"; `msg` carries any
      human-readable detail. (Same shape as ErrorModelV2; this name is
      what the source code uses for the success-side cases.)
    properties:
      status:
        type: string
        enum:
          - success
          - error
        example: "success"
      msg:
        type: string
  SuccessModel:
    type: object
    description: The successful response of a request
    properties:
      msg:
        type: string
        description: The detail success message
        example: Success
  SuccessModelV2:
    type: object
    description: The success response of a request
    properties:
      status:
        type: string
        example: "success"
        description: The response status
      msg:
        type: string
        default: "success"
        description: The response message
  AdminMetadata:
    type: object
    properties:
      userId:
        type: string
        description: '"sub" claim of user JWT who requested registration'
      description:
        type: string
      site_name:
        type: string
        description: "Name of the site"
      institution:
        type: string
        description: >
          "Unique identifier of the institution to register to.
          For Pelican running in OSDF mode, this will be the OSG ID of the institution"
        example: "https://osg-htc.org/iid/01y2jtd41"
      security_contact_user_id:
        type: string
        description: '"sub" claim of user responsible for the security of the service'
      status:
        $ref: "#/definitions/RegistrationStatus"
      approver_id:
        type: string
        description: '"sub" claim of user JWT who approved the service registration'
      approved_at:
        type: string
        format: date-time
        description: "Timestamp of when the registration was approved"
      created_at:
        type: string
        format: date-time
        description: "Timestamp of when the registration was created"
      updatedAt:
        type: string
        format: date-time
        description: "Timestamp of the last update"
  CreateApiToken:
    type: object
    properties:
      name:
        type: string
        description: The name of the token
      createdBy:
        type: string
        description: The user who created the token
      expiration:
        type: string
        description: The expiration time of the token. If it is empty or "never", the token will never expire. The token should be in the RFC3339 format.
      scopes:
        type: array
        items:
          type: string
        description: Token scopes, complete list can be found at https://github.com/PelicanPlatform/pelican/blob/main/token_scopes/token_scopes.go
  ListApiTokenSuccess:
    type: object
    properties:
      keys:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              description: The ID of the token
            name:
              type: string
              description: The name of the token
            createdBy:
              type: string
              description: The user who created the token
            expiration:
              type: string
              description: The expiration time of the token. If it is empty or "never", the token will never expire. The token should be in the RFC3339 format.
            scopes:
              type: string
              description: Token scopes, complete list can be found at https://github.com/PelicanPlatform/pelican/blob/main/token_scopes/token_scopes.go
  CreateApiTokenSuccess:
    type: object
    properties:
      token:
        type: string
        description: The created token
  AdminMetadataForRegistration:
    type: object
    required:
      - "institution"
    properties:
      description:
        type: string
      site_name:
        type: string
        description: "Name of the site"
      institution:
        type: string
        description: >
          "Unique identifier of the institution to register to.
          For Pelican running in OSDF mode, this will be the OSG ID of the institution"
        example: "https://osg-htc.org/iid/01y2jtd41"
      security_contact_user_id:
        type: string
        description: '"sub" claim of user responsible for the security of the service'
  RegistrationStatus:
    type: string
    enum:
      - Pending
      - Approved
      - Denied
      - Unknown
  NamespaceWOPubkey:
    type: object
    properties:
      id:
        type: integer
        description: The ID of the namespace entry
        example: 1
      prefix:
        type: string
        description: The namespace prefix to register. Should be an absolute path.
        example: "/test"
      identity:
        type: string
        description: The user identity we get from CILogon if the namespace is registered via CLI with `--with-identity` flag
      admin_metadata:
        $ref: "#/definitions/AdminMetadata"
      custom_fields:
        type: object
        description: The custom fields user registered, configurable by setting Registry.CustomRegistrationFields.
  Institution:
    type: object
    properties:
      id:
        type: string
        description: The unique ID of the institution. For Pelican running in OSDF alias, this will be OSG ID of the institution
        example: https://osg-htc.org/iid/01y2jtd41
      name:
        type: string
        description: The name of the institution
        example: University of Wisconsin - Madison
  Namespace:
    type: object
    properties:
      id:
        type: integer
        description: The ID of the namespace entry
        example: 1
      prefix:
        type: string
        description: The namespace prefix to register. Should be an absolute path.
        example: "/test"
      identity:
        type: string
        description: The user identity we get from CILogon if the namespace is registered via CLI with `--identity` flag
      pubkey:
        type: string
        description:
          The public JWK from the origin that wants to register the namespace.
          It should be a marshaled (stringified) JSON that contains either one JWK or a JWKS
      admin_metadata:
        $ref: "#/definitions/AdminMetadata"
      custom_fields:
        type: object
        description: The custom fields user registered, configurable by setting Registry.CustomRegistrationFields.
  TokenGeneration:
    type: object
    properties:
      strategy:
        type: string
        example: "OAuth2"
      vaultServer:
        type: string
      maxScopeDepth:
        type: integer
      issuer:
        type: string
        format: uri
  TokenIssuer:
    type: object
    properties:
      issuer:
        type: string
        format: uri
      basePaths:
        type: array
        items:
          type: string
      restrictedPaths:
        type: array
        items:
          type: string
  NamespaceAdV2:
    type: object
    properties:
      Caps:
        type: object
        $ref: "#/definitions/OriginExportCapabilities"
      path:
        type: string
        example: "/barten/time"
      tokenGeneration:
        type: array
        items:
          type: object
          $ref: "#/definitions/TokenGeneration"
      tokenIssuer:
        type: array
        items:
          type: object
          $ref: "#/definitions/TokenIssuer"
      fromTopology:
        type: boolean
        example: false
  NamespaceAdV2Mapped:
    allOf:
      - $ref: "#/definitions/NamespaceAdV2"
      - type: object
        properties:
          origins:
            type: array
            items:
              type: string
            example: ["example-origin.com"]
          caches:
            type: array
            items:
              type: string
            example: ["example-cache.com"]
  NamespaceForRegistration:
    type: object
    required:
      - "prefix"
      - "pubkey"
    properties:
      prefix:
        type: string
        description: The namespace prefix to register. Should be an obsolute paths
        example: "/test"
      pubkey:
        type: string
        description:
          The public JWK from the origin that wants to register the namespace.
          It should be a marshaled (stringified) JSON that contains either one JWK or a JWKS
      admin_metadata:
        $ref: "#/definitions/AdminMetadataForRegistration"
      custom_fields:
        type: object
        description: The custom fields to register, configurable by setting Registry.CustomRegistrationFields.
  TopologyNamespace:
    type: object
    properties:
      id:
        type: integer
      prefix:
        type: string
        default: ""
  RegistrationFieldType:
    type: string
    enum:
      - string
      - int
      - enum
      - datetime
    example: enum
  RegistrationField:
    type: object
    required:
      - "name"
      - "displayed_name"
      - "type"
      - "required"
    properties:
      name:
        type: string
        description: |
          The name of the field as the key of the object to submit the request. Note that if the
          name is dot '.' separated, it means the hierarchy of the object.

          For example, `custom_fields.department` means that your request needs to be

          ```json
            {
              "custom_fields": {
                "department": "value"
              }
            }
          ```
        example: "custom_fields.department"
      displayed_name:
        type: string
        description: The human-readable name of the field
        example: "Department"
      type:
        description: The data type of the field
        $ref: "#/definitions/RegistrationFieldType"
      required:
        description: If this field is required for registration
        type: boolean
      options:
        description: The available options if the field is "enum" type
        type: array
        items:
          type: object
          properties:
            name:
              type: string
              description: The name of the option that will appear in UI
              example: "Option A"
            id:
              type: string
              description: The unique identifier of the option that will be stored in db
              example: "option1"
          minItems: 0
  ObjectStatResponse:
    type: object
    properties:
      status:
        type: string
        example: "success"
        description: The status of the stat call. Will be either "success" or "error"
      msg:
        type: string
        example: "Stat finished with required number of responses."
        description: The detailed message of the status
      errorType:
        type: string
        example: "ParameterError"
        description: |
          The type of the error if status == "error".
          Will be one of "ParameterError" | "NoPrefixMatchError" | "InsufficientResError" |  "CancelledError"
      objects:
        type: array
        description: The metadata of objects if status == "success"
        items:
          type: object
          $ref: "#/definitions/ObjectStatMetadata"
      deniedServers:
        type: array
        description: |
          A list of issuer URLs from servers who responded with 403 to the stat request.
          Used for obtaining a token to access the object.
        items:
          type: string
          example: "https://pelican-origin.org:8444"
  ObjectStatMetadata:
    type: object
    properties:
      checksum:
        type: string
        default: ""
      contentLength:
        type: integer
        example: 10
      url:
        type: string
        description: The URL to get the object
        example: "https://example-origin.com:8443/foo/bar/test.txt"
  DirectorServerResponse:
    type: object
    properties:
      name:
        type: string
        example: "Test Origin"
      storageType:
        type: string
        example: "posix"
        description: The server storage type. Can be one of `posix`, `s3`, `globus`, `http`, and `xroot`
      disableDirectorTest:
        type: boolean
        example: true
        description: Whether the director-based object transfer tests are disabled
      authUrl:
        type: string
        description: The URL of the issuer on the server to check token validity
        example: "https://example-origin.com:8443"
      brokerUrl:
        type: string
        description: The URL to the connection broker
        example: "https://example-origin.com:8447"
      url:
        type: string
        description: The URL of XrootD service on the server to access objects
        example: "https://example-origin.com:8443"
      webUrl:
        type: string
        description: The URL of the web engine running on the server to visit the web interface and send API requests
        example: "https://example-origin.com:8444"
      type:
        type: string
        description: Type of the server. Origin|Cache
        example: Origin
      latitude:
        type: number
        description: The latitude of the server based on its IP address
        default: 0
      longitude:
        type: number
        description: The longitude of the server based on its IP address
        default: 0
      capabilities:
        type: object
        $ref: "#/definitions/OriginExportCapabilities"
      filtered:
        type: boolean
        description: |
          If the server is excluded from serving client object requests.
          No traffic will be redirect to the server if the value is true
        default: false
      filteredType:
        type: string
        description: |
          The type of filtering/allowance of the server. Can be permFilter|tempFilter|tempAllow

          * **permFilter** when the server is filtered by configuration parameter `Director.FilteredServers`
          * **tempFilter** when the server is filtered by web API request at `/servers/filter/*name`. The filter
            rule lives in-memory and will be reset at the server restart
          * **tempAllow** when the  server is filtered by configuration parameter but _allowed_ by the web API at `/servers/allow/*name`,
            the change lives in-memory and will be overwritten by config parameter at the server restart
        default: ""
      fromTopology:
        type: boolean
        description: Whether this server is from the legacy OSDF topology service VS Pelican
        default: false
      healthStatus:
        type: string
        description: The status of director file transfer test against the server. Can be Initializing|Unknown|OK|Error
        default: Unknown
      ioLoad:
        type: number
        description: The I/O load of the server, which is the average time spent waiting on I/O in the last 5 minutes.
        default: 0
      namespacePrefixes:
        type: array
        items:
          type: string
          minItems: 1
        default: []
        example: ["/foo", "/bar"]
        description: The namespaces the returned server provides
      downtime:
        type: array
        items:
          type: object
          $ref: "#/definitions/Downtime"
        description: The active and future downtime information of the server
  OriginExportCapabilities:
    type: object
    description: The access control of an origin exported namespace
    properties:
      PublicReads:
        type: boolean
        default: false
      Reads:
        type: boolean
        default: false
      Writes:
        type: boolean
        default: false
      Listings:
        type: boolean
        default: false
      DirectReads:
        type: boolean
        default: false
  OriginExport:
    type: object
    properties:
      status:
        type: string
        description: >
          The registration status of the federation prefix.
          Can be "Not Supported" | "Completed" | "Incomplete" | "Registration Error"

          * "Not Supported": the Pelican registry is below v7.8.0 and does not support checking registration status.
            In this case, `edit_url` is empty.
          * "Completed": the registration is completed
          * "Incomplete": the registration is not completed. `edit_url` will takes the user to the corresponding registration page
            to finish the registration. `status_description` contains detail information of which field(s) are missing.
          * "Registration Error": there is an error registering the namespace. `edit_url` is empty and the user cannot edit the registration.
        example: Incomplete
      statusDescription:
        type: string
        description: The detailed description of the status
        example: "Incomplete Registration: UserID is required"
      editUrl:
        type: string
        description: The URL to update the registration at the registry
        example: "https://registry.org/view/registry/namespace/edit/?id=1"
      storagePrefix:
        type: string
        example: "/tmp/pelican"
        description: The path to the directory to be exported on the host server
      federationPrefix:
        type: string
        example: "/demo"
        description: The prefix to access the file through the Pelican federation
      s3Bucket:
        type: string
        example: "demo-bucket"
        description: "The bucket name of the origin if it's using the S3 storage backend"
      s3AccessKeyfile:
        type: string
        example: "/path/to/key"
        description: "The path to the file that contains the access key or API key for S3 storage backend"
      s3SecretKeyfile:
        type: string
        example: "/path/to/secret"
        description: "The path to the file that contains the secret for S3 storage backend"
      globusCollectionID:
        type: string
        example: "7c2dc226-767d-4770-b887-720ef547537d"
        description: The UUID of the exported Globus collection
      globusCollectionName:
        type: string
        example: "Pelican Demo"
        description: The human-readable name of the exported Globus collection
      capabilities:
        type: object
        $ref: "#/definitions/OriginExportCapabilities"
      sentinel_location:
        type: string
        example: "sentinel.txt"
        description: "The relative path to the file that contains the sentinel file to test the storage device"
  OriginExportRes:
    type: object
    properties:
      type:
        type: string
        example: "posix"
        description: "The storage type of the origin server. Values can be posix, s3, and https"
      status:
        type: string
        description: >
          The registration status of the origin.
          Can be "Not Supported" | "Completed" | "Incomplete" | "Registration Error"

          * "Not Supported": the Pelican registry is below v7.8.0 and does not support checking registration status.
            In this case, `edit_url` is empty.
          * "Completed": the registration is completed
          * "Incomplete": the registration is not completed. `edit_url` will takes the user to the corresponding registration page
            to finish the registration. `status_description` contains detail information of which field(s) are missing.
          * "Registration Error": there is an error registering the origin. `edit_url` is empty and the user cannot edit the registration.
        example: Incomplete
      statusDescription:
        type: string
        description: The detailed description of the status
        example: "Incomplete Registration: UserID is required"
      editUrl:
        type: string
        description: The URL to update the registration at the registry
        example: "https://registry.org/view/registry/origin/edit/?id=1"
      s3Region:
        type: string
        description: "The server region for S3 storage. Only available when type == s3"
      s3ServiceUrl:
        type: string
        description: "The URL that provides API access the the S3 objects. Only available when type == s3"
      s3UrlStyle:
        type: string
        description:
          The style of S3 urls used by the service URL host. Can be either \"path\" or \"virtual\". Only available when type == s3
          Refer to [Pelican Documentation](https://docs.pelicanplatform.org/parameters#Origin-S3UrlStyle) for details
      httpServiceUrl:
        type: string
        description: "The URL used as the base for requests to the backend. Only available when type == https"
      exports:
        type: array
        items:
          $ref: "#/definitions/OriginExport"
        minItems: 0
  GlobusExport:
    type: object
    properties:
      uuid:
        type: string
        example: "f933ab04-f34a-4a33-8e2c-cd74bc5622f4"
        description: The UUID of the exported Globus collection
      displayName:
        type: string
        example: Open Data
        description: The human readable name of the exported Globus collection
      status:
        type: string
        example: "Inactive"
        description: >-
          The activation status of the Globus collection.
          Can be either "Inactive" or "Activated".
      description:
        type: string
        example: Server Status
        description: >-
          The detailed description of the activation status of the Globus Collection.
          Available when `status != Activated`
      httpsServer:
        type: string
        example: "https://example-server.com"
        description: The https server to request files in the Globus collection
      federationPrefix:
        type: string
        example: "/demo"
        description: The prefix to access the file through the Pelican federation
  DirectorContact:
    type: object
    properties:
      email:
        type: string
        default: ""
      url:
        type: string
        default: ""
  Downtime:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier for the downtime entry
        example: "019564c2-7893-73e1-ab74-c566972cf059"
      serverName:
        type: string
        description: >-
          The name of the server affected by the downtime.
          In Origin or Cache server, this property is empty because all entries in the table are its own downtimes.
          In Registry, this property uses the prefix of a server, instead of the server name.
        example: "TEST_ORIGIN"
      source:
        type: string
        description: Which Pelican service sets this downtime entry
        example: "registry"
        enum:
          - registry
          - origin
          - cache
      createdBy:
        type: string
        description: The person who created the downtime entry
      updatedBy:
        type: string
        description: The person who updated the downtime entry
      class:
        type: string
        description: Class of downtime (SCHEDULED or UNSCHEDULED)
        enum:
          - SCHEDULED
          - UNSCHEDULED
      description:
        type: string
        description: Description of the downtime event
        example: "Cooling system maintenance"
      severity:
        type: string
        description: Severity of the downtime event (Outage, Severe, IntermittentOutage, NoSignificantOutageExpected)
        enum:
          - Outage (completely inaccessible)
          - Severe (most services down)
          - Intermittent Outage (may be up for some of the time)
          - No Significant Outage Expected (you shouldn't notice)
      startTime:
        type: integer
        format: int64
        description: Start time of the downtime in milliseconds since epoch (UTC)
        example: 1740428588000
      endTime:
        type: integer
        format: int64
        description: End time of the downtime in milliseconds since epoch (UTC). -1 indicates the downtime is ongoing indefinitely.
        example: 1740967199900
      createdAt:
        type: integer
        format: int64
        description: Timestamp of creation in milliseconds since epoch (UTC)
        example: 1741152221331
      updatedAt:
        type: integer
        format: int64
        description: Timestamp of last update in milliseconds since epoch (UTC)
        example: 1741152221331
  Collection:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier for the collection
        example: "481c756c"
      name:
        type: string
        description: Name of the collection
        example: "My Research Data"
      description:
        type: string
        description: Description of the collection
        example: "Collection of research data files"
      owner:
        type: string
        description: The owner of the collection
        example: "user@example.com"
      namespace:
        type: string
        description: The namespace prefix this collection belongs to
        example: "/research/data"
      visibility:
        type: string
        description: Visibility of the collection
        enum:
          - private
          - public
        example: "private"
      createdAt:
        type: string
        format: date-time
        description: When the collection was created
        example: "2024-01-15T10:30:00Z"
      updatedAt:
        type: string
        format: date-time
        description: When the collection was last updated
        example: "2024-01-15T10:30:00Z"
      members:
        type: array
        items:
          $ref: "#/definitions/CollectionMember"
        description: List of collection members
      acls:
        type: array
        items:
          $ref: "#/definitions/CollectionACL"
        description: List of access control entries
      metadata:
        type: array
        items:
          $ref: "#/definitions/CollectionMetadata"
        description: List of metadata key-value pairs
  CollectionMember:
    type: object
    properties:
      collectionId:
        type: string
        description: ID of the collection
        example: "481c756c"
      object_url:
        type: string
        description: Full pelican:// URL of the object
        example: "pelican://origin.example.com/research/data/file1.txt"
      createdBy:
        type: string
        description: User who added this member
        example: "user@example.com"
      createdAt:
        type: string
        format: date-time
        description: When the member was added
        example: "2024-01-15T10:30:00Z"
  CollectionACL:
    type: object
    properties:
      collectionId:
        type: string
        description: ID of the collection
        example: "481c756c"
      groupId:
        type: string
        description: ID or name of the group
        example: "research-team"
      role:
        type: string
        description: Role granted to the group
        enum:
          - read
          - write
          - owner
        example: "read"
      createdBy:
        type: string
        description: User who created this ACL
        example: "admin@example.com"
      granted_at:
        type: string
        format: date-time
        description: When the ACL was granted
        example: "2024-01-15T10:30:00Z"
      expiresAt:
        type: string
        format: date-time
        description: When the ACL expires (optional)
        example: "2024-12-31T23:59:59Z"
  CollectionMetadata:
    type: object
    properties:
      collectionId:
        type: string
        description: ID of the collection
        example: "481c756c"
      key:
        type: string
        description: Metadata key
        example: "project"
      value:
        type: string
        description: Metadata value
        example: "Climate Research"
  Group:
    type: object
    description: >-
      A group is a set of users; membership is one of the inputs to
      authorization. The four-concept user/group model (see
      `docs/user-group-design.md`) gives every group BOTH a
      machine-readable `name` (used in policy strings; admin-controlled)
      and a human-readable `displayName` (UI label; owner-editable). Any
      authorization-affecting UI should render BOTH.
    properties:
      id:
        type: string
        description: Opaque internal primary key. Auto-generated, immutable, never used for authorization.
        example: "abc12345"
      name:
        type: string
        description: >-
          Machine-readable identifier. Used in admin lists, ACL grants,
          and policy strings. Validated by ValidateIdentifier (allowed
          characters A-Za-z0-9._@-, length 2-64; '/' explicitly banned).
          **Editable only by system administrators.** Group owners and
          group admins cannot rename a group.
        example: "research-team"
      displayName:
        type: string
        description: >-
          Human-readable label rendered in the UI. Owner-editable. UIs
          that don't have a display name should fall back to `name`.
        example: "Climate Research Team"
      description:
        type: string
        description: Free-form description shown in the UI.
        example: "Team working on climate research"
      createdBy:
        type: string
        description: >-
          User ID of whoever caused this record to exist. May be a real
          user ID or the sentinel "unknown" for rows that predate the
          audit fields.
        example: "abc12345"
      creatorAuthMethod:
        type: string
        description: How the creator was authenticated when minting the group.
        enum:
          - ""
          - web-cookie
          - api-token
          - bearer-jwt
        example: "web-cookie"
      creatorAuthMethodId:
        type: string
        description: When creatorAuthMethod is "api-token", the 5-character API-token ID prefix; empty otherwise.
        example: "AbCdE"
      ownerId:
        type: string
        description: User ID of the group owner (can transfer ownership, set admin, manage members).
        example: "abc12345"
      adminId:
        type: string
        description: User or group ID delegated as group administrator (can manage members).
        example: "def67890"
      adminType:
        type: string
        description: Whether adminId refers to a 'user' or a 'group'.
        enum:
          - ""
          - user
          - group
        example: "user"
      createdAt:
        type: string
        format: date-time
        example: "2024-01-15T10:30:00Z"
      updatedAt:
        type: string
        format: date-time
      members:
        type: array
        items:
          $ref: "#/definitions/GroupMember"
        description: Group members (typically only populated by GET /groups/{id}, not by list endpoints).
      ownerUser:
        $ref: "#/definitions/UserCard"
      adminUser:
        $ref: "#/definitions/UserCard"
      adminGroup:
        $ref: "#/definitions/GroupCard"
      createdByUser:
        $ref: "#/definitions/UserCard"
  User:
    type: object
    description: >-
      Canonical user record. Per the four-concept model
      (`docs/user-group-design.md`): `id` is opaque-internal,
      `username` is the authorization handle (admin-controlled),
      `displayName` is a human label (self-editable), and (`sub`,
      `issuer`) is the *primary* linked OIDC identity (login linkage
      only — never used for authorization). Additional identities live
      in user_identities.
    properties:
      id:
        type: string
        description: Opaque internal primary key. Immutable; never reused (deletes are soft).
      username:
        type: string
        description: >-
          Authorization handle. Validated by ValidateIdentifier.
          Admin-only renames after first creation; on rename, if the
          user is a local-issuer account, the primary `sub` is kept in
          lockstep (otherwise password login would silently break).
      sub:
        type: string
        description: >-
          The 'sub' claim of the user's *primary* linked OIDC identity.
          For local-issuer users this equals `username`. Used for login
          linkage; never used for authorization.
      issuer:
        type: string
        description: The 'iss' claim of the user's primary linked OIDC identity.
      status:
        type: string
        description: User account status.
        enum:
          - active
          - inactive
        example: "active"
      lastLoginAt:
        type: string
        format: date-time
        description: Timestamp of the user's last login.
      displayName:
        type: string
        description: Human-readable label. Self-editable via PATCH /me. Refreshed from the IdP on each OIDC login.
        example: "John Doe"
      aupVersion:
        type: string
        description: Version of the AUP the user agreed to.
      aupAgreedAt:
        type: string
        format: date-time
        description: Timestamp when the user agreed to the AUP.
      createdBy:
        type: string
        description: >-
          User ID of whoever caused this record to exist, or one of the
          sentinels "self-enrolled" (auto-created on first OIDC sign-in
          or htpasswd login) or "unknown" (pre-audit-column rows).
      creatorAuthMethod:
        type: string
        description: How the creator was authenticated when the row was inserted.
        enum:
          - ""
          - web-cookie
          - api-token
          - bearer-jwt
      creatorAuthMethodId:
        type: string
        description: When creatorAuthMethod is "api-token", the 5-character API-token ID prefix.
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  UserCard:
    type: object
    description: >-
      Public-safe user summary used to render "Display Name (username)"
      labels in places that don't need the full record and shouldn't
      require user-listing privilege.
    properties:
      id:
        type: string
      username:
        type: string
      displayName:
        type: string
  GroupCard:
    type: object
    description: Public-safe group summary, analogous to UserCard.
    properties:
      id:
        type: string
      name:
        type: string
  GroupMember:
    type: object
    properties:
      groupId:
        type: string
        description: ID of the group
        example: "abc12345"
      userId:
        type: string
        description: ID of the user
      user:
        $ref: "#/definitions/User"
      createdBy:
        type: string
        description: User who added this member
        example: "admin@example.com"
      createdAt:
        type: string
        format: date-time
        description: When the member was added
        example: "2024-01-15T10:30:00Z"
  GroupInviteLink:
    type: object
    description: >-
      Generalized invite link. The `kind` discriminator selects the
      semantics: `group` invites add the redeeming caller to a group
      (require authentication at redemption time), `password` invites
      let the holder set the password for `targetUserId` without
      authenticating (the token IS the credential — admins use this
      to onboard local accounts without ever knowing the password).
      `inviteToken` is the plaintext token; it is returned ONLY at
      creation time, never on subsequent reads.
    properties:
      id:
        type: string
      kind:
        type: string
        enum:
          - group
          - password
        description: Discriminator; selects which fields are meaningful.
        example: "group"
      groupId:
        type: string
        description: Set when `kind=group`; empty for `password` and for user-onboarding invites.
      targetUserId:
        type: string
        description: Set when `kind=password`; the user whose password the link will set.
      createdBy:
        type: string
      authMethod:
        type: string
        description: How the *creator* was authenticated when minting this link.
        enum:
          - ""
          - web-cookie
          - api-token
          - bearer-jwt
      authMethodId:
        type: string
        description: When authMethod is "api-token", the 5-character API-token ID prefix.
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      expiresAt:
        type: string
        format: date-time
      isSingleUse:
        type: boolean
        description: Always true for `password` kind; configurable for `group` kind.
      redeemedBy:
        type: string
        description: User ID that consumed the link (for password kind, the target user).
      redeemedAt:
        type: string
        format: date-time
      revoked:
        type: boolean
  GroupInviteLinkCreated:
    description: >-
      Response shape for invite-link creation endpoints. Extends
      GroupInviteLink with the plaintext `inviteToken`, which is
      returned exactly once and is never recoverable later.
    allOf:
      - $ref: "#/definitions/GroupInviteLink"
      - type: object
        properties:
          inviteToken:
            type: string
            description: Plaintext invite token. Shown only once at creation; not stored in cleartext.
  InviteInfo:
    type: object
    description: >-
      Pre-redemption metadata returned by GET /invites/info. Lets the
      redemption UI render the right form (password entry vs.
      confirm-join-group vs. accept-collection-ownership) without
      consuming the token. Intentionally omits creator and target user
      to avoid leaking information beyond what the token-bearer already
      implicitly knows.
    properties:
      kind:
        type: string
        enum:
          - group
          - password
          - collection_ownership
      expiresAt:
        type: string
        format: date-time
      isSingleUse:
        type: boolean
      groupId:
        type: string
        description: Present only when kind=group.
      groupName:
        type: string
        description: Resolved group name for kind=group. Drives the "join group X?" confirmation.
      groupDisplayName:
        type: string
        description: Optional human label for kind=group.
      collectionId:
        type: string
        description: Present only when kind=collection_ownership.
      collectionName:
        type: string
        description: Friendly name for kind=collection_ownership.
      collectionNamespace:
        type: string
        description: Path prefix the collection is rooted at (e.g. "/research/dataset-A"). Shown in the redemption UI so the recipient sees what they're claiming.
  ScopeCatalogEntry:
    type: object
    description: >-
      One entry in the user-grantable scope catalog returned by
      GET /scopes. Drives the management UI's grant picker. Catalog
      contents come from docs/scopes.yaml entries marked
      `userGrantable: true`.
    properties:
      name:
        type: string
        description: Machine-readable scope name (e.g. "server.user_admin").
      description:
        type: string
        description: Human-readable explanation. May be omitted for legacy entries that lack a description in scopes.yaml.
  UserScopeGrant:
    type: object
    description: >-
      One row in `user_scopes` — a scope granted directly to a single
      user. Group-derived and config-derived scopes are NOT
      represented here; for the full effective set, use GET /me/scopes
      (self) or compute server-side via EffectiveScopes().
    properties:
      userId:
        type: string
      scope:
        type: string
      grantedBy:
        type: string
        description: User ID of the granter, or one of the audit sentinels (self-enrolled, unknown).
      authMethod:
        type: string
        description: How the granter was authenticated when the grant was made.
        enum: ["", "web-cookie", "api-token", "bearer-jwt"]
      authMethodId:
        type: string
        description: Auth-method-specific identifier (e.g. API-token short ID); omitted for web-cookie sessions.
      grantedAt:
        type: string
        format: date-time
  GroupScopeGrant:
    type: object
    description: >-
      One row in `group_scopes` — a scope granted to a group. Every
      member of the group (DB row member or OIDC-asserted via
      wlcg.groups) inherits the scope through EffectiveScopes.
    properties:
      groupId:
        type: string
      scope:
        type: string
      grantedBy:
        type: string
      authMethod:
        type: string
        enum: ["", "web-cookie", "api-token", "bearer-jwt"]
      authMethodId:
        type: string
      grantedAt:
        type: string
        format: date-time
  AUPDocumentResp:
    type: object
    description: >-
      The shape returned by GET /aup and GET /aup/{version}. Carries
      the active or historical AUP plus enough context for the UI to
      render the standard footer ("This text was last updated on ...
      and can be found at ...").
    properties:
      content:
        type: string
        description: Markdown body of the AUP.
      version:
        type: string
        description: 16-char SHA-256 prefix of the content. Identifies which text a user signed.
      source:
        type: string
        description: >-
          Where the active text came from. `db` = operator-edited via
          /settings/aup; `operator` = file at Server.AUPFile;
          `default` = embedded Pelican default; `none` only ever
          appears as a placeholder when AUP enforcement is disabled
          (in which case the endpoint returns 404 instead).
        enum: [db, operator, default, none]
      lastUpdated:
        type: string
        description: Optional human-readable revision date for the rendered footer.
      canonicalUrl:
        type: string
        description: Optional canonical URL for the policy (Server.AUPCanonicalURL).
      editable:
        type: boolean
        description: True when the active copy is operator-edited (source=db) and therefore live-editable through PUT /aup.
  AUPDocument:
    type: object
    description: >-
      One row in `aup_documents` (the persisted version history
      returned by GET /aup/versions). Append-only — edits create new
      rows rather than mutating existing ones.
    properties:
      id:
        type: string
      version:
        type: string
        description: Content hash; matches users.aup_version when this row is the one a user accepted.
      content:
        type: string
      createdBy:
        type: string
        description: User ID of the admin who saved this version, or the audit sentinel for migration-time seeds.
      authMethod:
        type: string
        enum: ["", "web-cookie", "api-token", "bearer-jwt"]
      authMethodId:
        type: string
      lastUpdated:
        type: string
        description: Operator-supplied date label for the rendered footer.
      isActive:
        type: boolean
        description: True for exactly one row at any time — the version users are currently being asked to accept.
      createdAt:
        type: string
        format: date-time
  UserIdentity:
    type: object
    description: >-
      Secondary OIDC identity for a user. The user's *primary* identity
      lives on the User row itself (User.sub + User.issuer); this table
      holds *additional* identities the user has linked. A user may have
      at most one identity per issuer in total (primary + secondaries),
      enforced by an in-table unique index plus a cross-table check
      against User.issuer.
    properties:
      id:
        type: string
      userId:
        type: string
      sub:
        type: string
      issuer:
        type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  Me:
    description: >-
      The calling user's own record (returned by GET /me). Identical
      shape to User; the distinction is that /me/* endpoints always
      address the caller and are accessible without admin privileges.
    allOf:
      - $ref: "#/definitions/User"
  MePatch:
    type: object
    description: >-
      Body for PATCH /me. Only displayName is self-editable. Username,
      sub, issuer, and the user_identities are admin-only and go
      through the corresponding /users endpoints instead.
    properties:
      displayName:
        type: string
  CreateCollectionRequest:
    type: object
    required:
      - name
      - namespace
    properties:
      name:
        type: string
        description: Name of the collection
        example: "My Research Data"
      description:
        type: string
        description: Description of the collection
        example: "Collection of research data files"
      visibility:
        type: string
        description: Visibility of the collection
        enum:
          - private
          - public
        default: "private"
        example: "private"
      metadata:
        type: object
        additionalProperties:
          type: string
        description: Key-value pairs of metadata
        example:
          project: "Climate Research"
          department: "Environmental Science"
      namespace:
        type: string
        description: The namespace prefix this collection belongs to
        example: "/research/data"
  UpdateCollectionRequest:
    type: object
    properties:
      name:
        type: string
        description: New name for the collection
        example: "Updated Research Data"
      description:
        type: string
        description: New description for the collection
        example: "Updated collection description"
      visibility:
        type: string
        description: New visibility for the collection
        enum:
          - private
          - public
        example: "public"
  AddCollectionMembersRequest:
    type: object
    required:
      - members
    properties:
      members:
        type: array
        items:
          type: string
        description: List of pelican:// URLs to add as members
        example: ["pelican://origin.example.com/research/data/file1.txt"]
  RemoveCollectionMembersRequest:
    type: object
    required:
      - members
    properties:
      members:
        type: array
        items:
          type: string
        description: List of pelican:// URLs to remove as members
        example: ["pelican://origin.example.com/research/data/file1.txt"]
  GrantACLRequest:
    type: object
    required:
      - groupId
      - role
    properties:
      groupId:
        type: string
        description: ID or name of the group to grant access to
        example: "research-team"
      role:
        type: string
        description: Role to grant
        enum:
          - read
          - write
          - owner
        example: "read"
      expiresAt:
        type: string
        format: date-time
        description: When the ACL expires (optional)
        example: "2024-12-31T23:59:59Z"
  RevokeACLRequest:
    type: object
    required:
      - groupId
      - role
    properties:
      groupId:
        type: string
        description: ID or name of the group to revoke access from
        example: "research-team"
      role:
        type: string
        description: Role to revoke
        enum:
          - read
          - write
          - owner
        example: "read"
  CreateGroupRequest:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        description: >-
          Machine-readable group identifier. Validated by ValidateIdentifier
          (allowed characters A-Za-z0-9._@-, length 2-64; '/' explicitly
          banned). Cannot start with the reserved 'user-' prefix.
        example: "research-team"
      displayName:
        type: string
        description: Human-readable label shown in the UI. Optional; falls back to `name` when empty.
        example: "Climate Research Team"
      description:
        type: string
        description: Description of the group.
        example: "Team working on climate research"
  AddGroupMemberRequest:
    type: object
    properties:
      userId:
        type: string
        description: The unique user ID of the member to add
  ListCollectionResponse:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier for the collection
        example: "481c756c"
      name:
        type: string
        description: Name of the collection
        example: "My Research Data"
      owner_id:
        type: string
        description: The owner of the collection
        example: "user@example.com"
      description:
        type: string
        description: Description of the collection
        example: "Collection of research data files"
      visibility:
        type: string
        description: Visibility of the collection
        enum:
          - private
          - public
        example: "private"
      namespace:
        type: string
        description: The namespace prefix this collection belongs to
        example: "/research/data"
  GetCollectionResponse:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier for the collection
        example: "481c756c"
      name:
        type: string
        description: Name of the collection
        example: "My Research Data"
      owner_id:
        type: string
        description: The owner of the collection
        example: "user@example.com"
      description:
        type: string
        description: Description of the collection
        example: "Collection of research data files"
      visibility:
        type: string
        description: Visibility of the collection
        enum:
          - private
          - public
        example: "private"
      namespace:
        type: string
        description: The namespace prefix this collection belongs to
        example: "/research/data"
      members:
        type: array
        items:
          type: string
        description: List of pelican:// URLs that are members of this collection
        example: ["pelican://origin.example.com/research/data/file1.txt"]
      acls:
        type: array
        items:
          $ref: "#/definitions/CollectionACL"
        description: List of access control entries
      metadata:
        type: object
        additionalProperties:
          type: string
        description: Key-value pairs of metadata
        example:
          project: "Climate Research"
          department: "Environmental Science"
      createdAt:
        type: string
        format: date-time
        description: When the collection was created
        example: "2024-01-15T10:30:00Z"
      updatedAt:
        type: string
        format: date-time
        description: When the collection was last updated
        example: "2024-01-15T10:30:00Z"
  MetadataValue:
    type: object
    properties:
      value:
        type: string
        description: The metadata value
        example: "Climate Research"
  ServerRegistration:
    type: object
    description: A server registration entry in the registry
    properties:
      id:
        type: string
        description: Unique identifier for the server
        example: "01936b49-ea7f-7d6b-ab90-a56a5ec95e21"
      name:
        type: string
        description: Name of the server
        example: "TEST_ORIGIN"
      is_origin:
        type: boolean
        description: Whether this server is an origin server
        example: true
      is_cache:
        type: boolean
        description: Whether this server is a cache server
        example: false
      note:
        type: string
        description: Additional notes about the server
        example: "Production origin server"
      registration:
        type: array
        description: List of registrations associated with this server
        items:
          $ref: "#/definitions/Namespace"
  ServerLocalMetadata:
    type: object
    description: Local cache of server metadata stored on Origins and Caches.
    properties:
      id:
        type: string
        description: Registry-assigned server ID
        example: "18f1jk5"
      name:
        type: string
        description: Human-readable server name reported to the registry
        example: "UW_OSDF_CACHE"
      type:
        type: string
        description: Server type (origin, cache)
        example: "origin"
      createdAt:
        type: string
        format: date-time
        description: Timestamp when this metadata record was created locally
        example: "2025-02-10T18:22:00Z"
      updatedAt:
        type: string
        format: date-time
        description: Timestamp when this metadata record was last refreshed locally
        example: "2025-02-15T18:22:00Z"
  IssuerAdminCreateClientRequest:
    type: object
    description: Request body for creating a new OIDC client via the admin API.
    required:
      - grant_types
    properties:
      client_name:
        type: string
        description: Optional human-readable label for the client
        example: "my-token-exchange-client"
      redirect_uris:
        type: array
        description: Redirect URIs accepted by this client
        items:
          type: string
      grant_types:
        type: array
        description: >-
          Grant types this client is allowed to use.
          Accepted values: authorization_code, refresh_token,
          urn:ietf:params:oauth:grant-type:device_code,
          urn:ietf:params:oauth:grant-type:token-exchange.
        items:
          type: string
        example:
          - "urn:ietf:params:oauth:grant-type:token-exchange"
          - "refresh_token"
      response_types:
        type: array
        description: Response types supported by this client (e.g. code, token)
        items:
          type: string
      scopes:
        type: array
        description: >-
          Scopes the client is allowed to request.
          If omitted, a default set of scopes is assigned.
        items:
          type: string
        example:
          - "openid"
          - "storage.read:/"
          - "storage.modify:/"
      public:
        type: boolean
        description: Whether this client is a public (no secret) client
        default: false
  IssuerAdminClientResponse:
    type: object
    description: OIDC client details as returned by the admin API.
    properties:
      client_id:
        type: string
        description: The unique client identifier
        example: "a1b2c3d4e5f6g7h8"
      redirect_uris:
        type: array
        items:
          type: string
      grant_types:
        type: array
        items:
          type: string
        example:
          - "urn:ietf:params:oauth:grant-type:token-exchange"
          - "refresh_token"
      response_types:
        type: array
        items:
          type: string
      scopes:
        type: array
        items:
          type: string
      public:
        type: boolean
      created_at:
        type: string
        description: When this client was created
        example: "2025-03-01T12:00:00Z"
  IssuerAdminCreateClientResponse:
    type: object
    description: >-
      Response when creating a new OIDC client.
      Includes the client_secret which is only shown once at creation time.
    properties:
      client_id:
        type: string
        example: "a1b2c3d4e5f6g7h8"
      client_secret:
        type: string
        description: The plaintext client secret (only shown at creation time)
        example: "s3cr3t-v4lu3..."
      redirect_uris:
        type: array
        items:
          type: string
      grant_types:
        type: array
        items:
          type: string
      response_types:
        type: array
        items:
          type: string
      scopes:
        type: array
        items:
          type: string
      public:
        type: boolean
  IssuerAdminUpdateClientRequest:
    type: object
    description: >-
      Request body for updating an existing OIDC client.
      All fields are optional; only provided fields are changed.
    properties:
      redirect_uris:
        type: array
        description: Redirect URIs accepted by this client
        items:
          type: string
      grant_types:
        type: array
        description: >-
          Grant types this client is allowed to use.
          Must not be empty when provided.
        items:
          type: string
      response_types:
        type: array
        description: Response types supported by this client
        items:
          type: string
      scopes:
        type: array
        description: Scopes the client is allowed to request
        items:
          type: string

tags:
  - name: auth
    description: Authentication APIs for all servers
  - name: common
    description: Common APIs for all servers
  - name: metrics
    description: APIs for server metrics
  - name: registry_ui
    description: APIs for the Registry server Web UI
  - name: director_ui
    description: APIs for the Director server Web UI
  - name: director
    description: Non-UI facing APIs for the Director server
  - name: origin_ui
    description: APIs for the Origin server Web UI
  - name: cache_ui
    description: APIs for the Cache server Web UI
  - name: collections
    description: APIs for managing collections of objects
  - name: groups
    description: Admin APIs for managing groups (list, create, update, delete, ownership, members, invite links)
  - name: users
    description: Admin APIs for managing user accounts (list, create, update, delete, identities, password invites)
  - name: me
    description: Self-service APIs scoped to the calling user (no :id in the path; the target is always the caller)
  - name: invites
    description: Public invite-link redemption APIs (no authentication; the token is the credential)
  - name: scopes
    description: First-class user/group scope grants (server.admin, server.user_admin, server.collection_admin) and the catalog of user-grantable scopes
  - name: aup
    description: Acceptable Use Policy — public reads (current and versioned), admin edit, and persisted version history
  - name: issuer-admin
    description: Admin APIs for managing the embedded OIDC issuer clients and token exchange
paths:
  /health:
    get:
      tags:
        - "common"
      summary: Health check endpoint for server Web engine
      produces:
        - application/json
      responses:
        "200":
          description: "Server Web engine is running and taking requests"
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Web Engine Running. Time: 2024-01-10 22:32:59.637471175 +0000 UTC m=+35.515010725"
  /restart:
    post:
      tags:
        - "common"
      summary: Restart the server
      produces:
        - application/json
      responses:
        "200":
          description: "Restart the web server"
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
  /config:
    get:
      tags:
        - common
      summary: Return the configuration values of the server and their type
      description: >-
        `Authentication Required` `Admin privilege Required`
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            description: The JSON object output from viper with all config values and their type in the current server
            example:
              ConfigDir:
                Type: "string"
                Value: "/etc/pelican"
              Debug:
                Type: "bool"
                Value: true
              DisableHttpProxy:
                Type: "bool"
                Value: false
              DisableProxyFallback:
                Type: "bool"
                Value: false
              MinimumDownloadSpeed:
                Type: "int"
                Value: 0
              Cache:
                DataLocation:
                  Type: "string"
                  Value: "/run/pelican/xcache"
                EnableVoms:
                  Type: "bool"
                  Value: false
                ExportLocation:
                  Type: "string"
                  Value: "/"
                Port:
                  Type: "int"
                  Value: 8447
                XRootDPrefix:
                  Type: "string"
                  Value: ""
        "401":
          description: Unauthorized
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Permission denied. Admin privilege required.
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
    patch:
      tags:
        - "common"
      summary: Update the server configuration with user-provided changes
      description: "`Authentication Required` `Admin privilege Required`


        The server will restart promptly after a  successful request. You may query against
        `/health` endpoint to check if the server is back online.


        Note that the endpoint will update the value of **all parameters provided**, no matter the value is in default or not (`0`, `null`,`undefined`, etc).


        This means you want to eliminate parameters from the request body that are untouched."
      parameters:
        - in: body
          name: config
          required: true
          description: The config value to update.
            It must be a JSON object with keys/values that match config parameters' name and data type.
            Parameter names are case-insensitive.
          schema:
            type: object
            example:
              Logging:
                Cache:
                  Scitokens: "info"
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: Successfully updated the config. Server is restarting.
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
        "400":
          description: Bad request. The requested changes of config values are invalid.
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Unauthorized. You need to login to take this action.
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Permission denied. Admin privilege required.
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Server error. Can't update the config due to internal server error.
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /servers:
    get:
      tags:
        - common
      summary: Returns a list of enabled servers
      description: Server names are in lower-case, sorted in alphabetical order.
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            properties:
              servers:
                type: array
                items:
                  type: string
                  minItems: 1
                example: ["director", "origin", "registry"]
        "500":
          description: Server encountered error in reading institution configuration
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /tokens:
    post:
      tags:
        - common
      summary: Create an API token for the user
      description: "`Authentication Required`"
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          description: Create API Token request
          required: true
          schema:
            $ref: "#/definitions/CreateApiToken"
      responses:
        "200":
          description: Token created successfully
          schema:
            type: object
            $ref: "#/definitions/CreateApiTokenSuccess"
        "400":
          description: Invalid request
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
    get:
      tags:
        - common
      summary: List all API tokens for the user
      description: "`Authentication Required`"
      produces:
        - application/json
      responses:
        "200":
          description: Token list retrieved successfully
          schema:
            type: object
            $ref: "#/definitions/ListApiTokenSuccess"
        "500":
          description: Failed to list tokens
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /tokens/{id}:
    delete:
      tags:
        - common
      summary: Delete an API token for the user
      description: "`Authentication Required`"
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The ID of the token to delete
          required: true
          type: string
      responses:
        "200":
          description: Token deleted successfully
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
        "500":
          description: Failed to delete token
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /version:
    get:
      tags:
        - "common"
      summary: Retrieve server version and build details
      description: |
        This endpoint returns detailed version information about the server,
        including the build commit, build date, the entity responsible for the build, and the current version.
      produces:
        - application/json
      responses:
        "200":
          description: Successful retrieval of server version and build metadata
          schema:
            type: object
            properties:
              buildCommit:
                type: string
                example: "2a6af914c9b9ed4831ef78cbd2611da43f454324"
                description: The unique commit hash used for the build
              buildDate:
                type: string
                format: date-time
                example: "2025-02-24T16:24:23Z"
                description: The timestamp when the build was created
              builtBy:
                type: string
                example: "goreleaser"
                description: The tool responsible for the build
              version:
                type: string
                example: "7.8.0"
                description: The current version of the server
  /server/localMetadata/history:
    get:
      tags:
        - common
      summary: Retrieve local server metadata history
      description: |
        `Authentication Required` `Admin privilege Required`

        Available only on Origin and Cache servers.
        Returns the list of server metadata entries cached locally after syncing with the Registry.
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              $ref: "#/definitions/ServerLocalMetadata"
        "401":
          description: Authentication required
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Admin privilege required
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "404":
          description: Endpoint unavailable on this server type
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorModelV2"
  /metrics/health:
    get:
      tags:
        - metrics
      summary: Returns the health status of server components
      description: "`Authentication Required` `Admin Privilege Required"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            properties:
              status:
                type: string
                description: The overall health status of the server
              components:
                type: object
                description: The health status of each server components
                properties:
                  cmsd:
                    $ref: "#/definitions/HealthStatus"
                  federation:
                    $ref: "#/definitions/HealthStatus"
                  web-ui:
                    $ref: "#/definitions/HealthStatus"
                  xrootd:
                    $ref: "#/definitions/HealthStatus"
  /auth/login:
    post:
      tags:
        - auth
      summary: Login with username and password to Pelican web UI
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: userCredential
          description: The username and password to authenticate
          schema:
            type: object
            required:
              - user
              - password
            properties:
              user:
                type: string
              password:
                type: string
      responses:
        "200":
          description: Login succeed
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
        "400":
          description: Invalid request, when username or password is missing
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Login failed, when username or password doesn't match the record
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /auth/initLogin:
    post:
      tags:
        - auth
      summary: Login with one-time activation code to initialize web UI
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: activationCode
          description: The 6-digit code used to initialize web UI
          schema:
            type: object
            required:
              - code
            properties:
              code:
                type: string
                example: "123456"
      responses:
        "200":
          description: Login succeed
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
        "400":
          description:
            Invalid request, when authentication is already initialized,
            code-based login is not available, or login code is not provided
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Login failed, when code is not valid
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /auth/resetLogin:
    post:
      tags:
        - auth
      summary: Reset the password for the user
      description: "`Authentication Required` `Admin Privilege Required`"
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: newPassword
          description: The new password to reset to
          schema:
            type: object
            required:
              - password
            properties:
              password:
                type: string
                description: The new password to reset to
                example: ""
      responses:
        "200":
          description: Reset succeed
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
        "400":
          description: Invalid request request, when password is missing
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Unauthorized request, when users are not logged in
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Permission denied. Admin privilege required
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Server-side error, when failed to write the new password to auth file
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /auth/whoami:
    get:
      tags:
        - auth
      summary: Return the authentication status of the web ui
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            $ref: "#/definitions/WhoAmI"
          headers:
            X-CSRF-Token:
              description: The CSRF token that users are expected to attach as the request header for any modification requests for registry APIs (PUT/PATCH/DELETE).
              type: string
  /auth/loginInitialized:
    get:
      tags:
        - auth
      summary: Return the status of web UI initialization
      description:
        The initialization depends on if the user has used the one-time activation
        code to set up the password for the admin user
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            description: The initialization status
            properties:
              initialized:
                type: boolean
                example: true
  /auth/cilogon/login:
    get:
      tags:
        - auth
      deprecated: true
      summary: Redirect user to CILogon authentication page for OAuth2 third-party login
      description: This endpoint is deprecated. Please migrate to use `/auth/oauth/login` instead.
      parameters:
        - in: query
          name: next_url
          type: string
          description: The path to redirect users to once they successfully authenticated against CILogon
      responses:
        "307":
          description: Redirect user to CILogon authentication page
        "500":
          description: Internal server error when generating CSRF cookie for OAuth flow
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /auth/cilogon/callback:
    get:
      tags:
        - "auth"
      deprecated: true
      summary: The callback endpoint CILogon will call once the user has been successfully authenticated
      description: |
        This endpoint is deprecated. Please migrate to use `/auth/oauth/callback` instead.

        Calling this URL with valid parameters will login the user to the Pelican server Web UI
      parameters:
        - in: query
          name: state
          type: string
          description: The CSRF token for validation and the next_url for redirect, in the form of `"<[16]byte>:<nextURL>"`
        - in: query
          name: code
          type: string
          description: The access token and refresh token returned from CILogon
      responses:
        "307":
          description: Successfully log the user in, add login cookie, and direct user to `/` if `next_url` is empty; otherwise to `next_url`
        "400":
          description: Invalid request, when `state` or `token` query is invalid
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error when processing the token and handshake with CILogon
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /auth/oauth:
    get:
      tags:
        - "auth"
      summary: List servers with OAuth2/OIDC login enabled
      description: >-
        By default, the "registry" item is included in the response array, as we turned on OIDC/OAuth
        for registry by default. The other two possible items in the array are `origin` and `cache`
      responses:
        "200":
          description: OK
          schema:
            type: object
            properties:
              oidc_enabled_servers:
                type: array
                items:
                  type: string
                  default: "registry"
                minItems: 1
  /auth/oauth/login:
    get:
      tags:
        - auth
      summary: Redirect user to OAuth2 authentication provider (default is CILogon) authentication page for OAuth2 third-party login
      parameters:
        - in: query
          name: nextUrl
          type: string
          description: The path to redirect users to once they successfully authenticated against OAuth2 authentication provider
      responses:
        "307":
          description: Redirect user to OAuth2 authentication provider authentication page
        "500":
          description: Internal server error when generating CSRF cookie for OAuth flow
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /auth/oauth/callback:
    get:
      tags:
        - "auth"
      summary: The callback endpoint OAuth2 authentication provider (default is CILogon) will call once the user has been successfully authenticated
      description: Calling this URL with valid parameters will login the user to Pelican website
      parameters:
        - in: query
          name: state
          type: string
          description: >-
            The state passed along from start of the authentication. In the form of `key1=val1&key2=val2`:
              - `pkce` is a required state for CSRF verification.
              - `nextUrl` is an optional state for redirect URL

        - in: query
          name: code
          type: string
          description: The access token and refresh token returned from the OAuth2 authentication provider
      responses:
        "307":
          description: Successfully log the user in, add login cookie, and direct user to `/` if `next_url` is empty; otherwise to `next_url`
        "400":
          description: Invalid request, when `state` or `token` query is invalid
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error when processing the token and handshake with the OAuth2 authentication provider
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /registry_ui/namespaces:
    get:
      tags:
        - "registry_ui"
      summary: Return a list of all namespaces in the registry
      description:
        A public API to get all namespaces in the registry. Note that `pubkey` is not included in the return data.


        For unauthenticated users, it only returns a list of approved namespaces.

        For authenticated users, it returns namespaces with any approval status.
      parameters:
        - name: prefixType
          in: query
          type: string
          required: false
          description:
            The type of the prefix to filter the results. The value can be `origin`, `cache`, or `namespace`

            For `origin` and `cache`, it filters origin/cache server registrations respectively.
            For `namespace`, it filters namespace prefixes
        - name: status
          in: query
          type: string
          required: false
          description:
            The approval status of the namespaces, can be `pending`, `approved`, `denied`, or `unknown`.

            If `status == unknown`, internally it will match any registration with `status == ""` or `status == "unknown"`

            For unauthenticated users, filter with `status != approved` will result in a 403 error.
        - name: legacy
          in: query
          type: boolean
          required: false
          description:
            To show/filter out legacy namespace registrations, which only has two non-empty fields, `prefix` and `pubkey`.
            Since this is a boolean parameter, it's OK to only pass `legacy` as the parameter without the `=true` value.
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              $ref: "#/definitions/NamespaceWOPubkey"
            description: An array of namespaces
        "400":
          description: Invalid request parameters
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "403":
          description: Operation forbidden, when an unauthenticated user trying to filter against `status != approval`
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
    options:
      tags:
        - "registry_ui"
      summary: Return a list of field available to register
      description: "`Authentication Required`"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              $ref: "#/definitions/RegistrationField"
    post:
      tags:
        - "registry_ui"
      summary: Create a new namespace registration
      description: "`Authentication Required`"
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: namespace
          description: The namespace data to register
          required: true
          schema:
            $ref: "#/definitions/NamespaceForRegistration"
        - in: header
          name: X-CSRF-Token
          description: The CSRF token for protecting against Cross-Site Request Forgery (CSRF) attacks. Obtained by requesting `/api/v1.0/auth/whoami` and reading response header `X-CSRF-Token`
          type: string
          required: true
      responses:
        "200":
          description: >
            OK.
            Note that if the registry runs in the OSDF mode,
            the `"message"` will reflect if there's an existing namespace in the OSDF topology.
          schema:
            type: object
            $ref: "#/definitions/SuccessModelV2"
        "400":
          description: The request data has invalid or missing field value
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Unauthorized
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /registry_ui/namespaces/user:
    get:
      tags:
        - "registry_ui"
      summary: Return a list of namespaces for the currently authenticated user
      description: "`Authentication Required`"
      parameters:
        - name: status
          in: query
          required: false
          description:
            The approval status of the namespaces, can be `pending`, `approved`, `denied`, or `unknown`.

            If `status == unknown`, internally it will match any registration with `status == ""` or `status == "unknown"`
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              $ref: "#/definitions/NamespaceWOPubkey"
            description: An array of namespaces
        "400":
          description: Invalid request parameters
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Authentication required
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Internal server error
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
  /registry_ui/namespaces/{id}:
    get:
      tags:
        - "registry_ui"
      summary: Return the namespace by `id`
      description: "`Authentication Required`


        For user with admin privilege, it returns for all valid namespace request.


        For general users, it only returns namespace belonging to the user, or it returns 404
        "
      operationId: getNamespaceById
      parameters:
        - name: id
          in: path
          description: ID of the namespace to fetch
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
            $ref: "#/definitions/Namespace"
        "400":
          description: Invalid namespace ID
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "401":
          description: Authentication required to perform this action
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
        "404":
          description: Namespace not found, either does not exists or the user doesn't have privilege to get it
          schema:
            type: object
            $ref: "#/definitions/ErrorModelV2"
