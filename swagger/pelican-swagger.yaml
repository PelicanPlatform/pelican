  /origin_ui/exports/prefixes:
    get:
      summary: Slim FederationPrefix list — namespaces the origin exports
      description: >-
        `Authentication Required`. Returns just the
        `FederationPrefix` of each configured export, with no storage
        paths, S3 credentials, Globus IDs, or registry edit-URL
        tokens. Reachable by any authenticated caller — the prefixes
        themselves are advertised to the registry, so listing them
        leaks nothing the federation can't already see.


        Drives the collection-onboarding form's prefix dropdown so a
        collection-admin (who isn't a system admin and so can't reach
        the full /origin_ui/exports response) can still pick an
        exported prefix. Callers who need the full export details
        (storage, credentials) should use /origin_ui/exports.
      tags:
        - "origin_ui"
      produces:
        - "application/json"
      responses:
        "200":
          description: OK
          schema:
            type: object
            properties:
              prefixes:
                type: array
                items:
                  type: string
                description: FederationPrefix strings, in declaration order.
        "401":
          description: Authentication required to perform this action
          schema:
            $ref: "#/definitions/ErrorModelV2"
        "500":
          description: Error fetching the origin exports
          schema:
            $ref: "#/definitions/ErrorModelV2"
